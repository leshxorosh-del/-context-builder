name: Build Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: context-builder-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: context-builder-frontend:test
          build-args: |
            VITE_API_URL=http://localhost:3001
            VITE_WS_URL=ws://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env
          echo "POSTGRES_PASSWORD=test_password" >> .env
          echo "NEO4J_PASSWORD=test_password" >> .env
          echo "JWT_ACCESS_SECRET=test_access_secret_min_32_characters_long" >> .env
          echo "JWT_REFRESH_SECRET=test_refresh_secret_min_32_characters_long" >> .env

      - name: Build and start services
        run: docker-compose up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for services to be ready..."
          sleep 30

      - name: Check service health
        run: |
          curl -f http://localhost:3001/health || exit 1
          curl -f http://localhost:5173/health || exit 1

      - name: Stop services
        if: always()
        run: docker-compose down -v
